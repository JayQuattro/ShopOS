services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: shopos
      POSTGRES_USER: shopos
      POSTGRES_PASSWORD: shopos
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shopos -d shopos"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - shopos-postgres:/var/lib/postgresql/data
      - ./scripts/init-test-db.sql:/docker-entrypoint-initdb.d/init-test-db.sql:ro

volumes:
  shopos-postgres:
